apiVersion: mq.ibm.com/v1beta1
kind: QueueManager
metadata:
  name: ibm-mq
spec:
  securityContext:
    readOnlyRootFilesystem: false
    supplementalGroups: [65534]
  pki:
    keys:
      - name: certificate
        secret:
          items:
            - tls.key
            - tls.crt
          secretName: __env____qmgrname__-cert
    trust:
      - name: ca
        secret:
          items:
            - ca.crt
          secretName: __env____qmgrname__-cert

  queueManager:
      resources:
        limits:
          cpu: 800m
        requests:
          cpu: 300m
      name: __ENV____QMGRNAME__
      availability:
        type: SingleInstance
      storage:
        queueManager:
          type: persistent-claim
          size: 2Gi
        defaultDeleteClaim: true
      mqsc:
      - configMap:
          name: __qmgrname__-mqsc-configmap
          items:
            - static.mqsc
